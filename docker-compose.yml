services:
  app:
    build: .
    container_name: mango-crm
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-crmmango}
      AUTH_SECRET: ${AUTH_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      SHIPPO_API_KEY: ${SHIPPO_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-haiku-4-5-20251001}
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: mango-crm-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
  uploads:
  backups:
